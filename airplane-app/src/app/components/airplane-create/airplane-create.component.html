<div class="p-6 max-w-2xl mx-auto">
  <a routerLink="/airplanes" mat-button class="mb-4">
    <mat-icon>arrow_back</mat-icon>
    Back to list
  </a>

  <h1 class="text-2xl font-medium text-gray-800 mb-6">Add airplane</h1>

  <app-airplane-form
    submitLabel="Add airplane"
    [loading]="loading()"
    [error]="error()"
    (formSubmit)="onFormSubmit($event)"
    (cancelled)="onCancel()"
  />
</div>
