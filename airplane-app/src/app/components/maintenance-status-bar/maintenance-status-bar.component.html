<div class="space-y-2">
  <div class="flex items-center justify-between">
    <span class="text-sm text-gray-500">Maintenance progress</span>
    <span class="text-xs text-gray-400">
      {{ flightsSinceLastMaintenance() }} / {{ maintenanceIntervalFlights() }} flights ({{
        progress()
      }}%)
    </span>
  </div>

  <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
    <div
      class="h-2.5 rounded-full transition-all duration-300"
      [ngClass]="barClass()"
      [style.width.%]="progress()"
    ></div>
  </div>

  @if (status() === 'maintenance') {
    <p class="text-xs text-amber-600 font-medium">This aircraft is currently under maintenance.</p>
  }

  <button
    mat-stroked-button
    (click)="onAddFlight()"
    [disabled]="status() === 'maintenance'"
    class="mt-2"
  >
    <mat-icon>flight_takeoff</mat-icon>
    Add flight
  </button>
</div>
